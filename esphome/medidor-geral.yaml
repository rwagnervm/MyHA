esphome:
  name: medidor-geral

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  use_address: medidor_geral.local

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret api_password

uart:
  tx_pin: D2
  rx_pin: D1
  baud_rate: 9600
  
modbus:

sensor:
  - platform: pzemac
    current:
      name: "Corrente Geral"
    voltage:
      name: "Voltagem Geral"
    power:
      name: "Potencia Geral"
      id: potencia_geral
    energy:
      name: "Consumo Total"
    frequency:
      name: "Frequencia Geral"
    power_factor:
      name: "Fator de Potencia Geral"
    update_interval: 5s
