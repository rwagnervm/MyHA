esphome:
  name: ir-quarto-wagner
  libraries:
    - IRremoteESP8266@2.8.6

external_components:
  - source: "./custom_components"
    components: [samsung_ac_climate]

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 0s
  fast_connect: true

api:
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret ota_password

sensor:
  - platform: homeassistant
    id: ar_temp
    accuracy_decimals: 1
    entity_id: sensor.temperatura_quarto_wagner
    state_class: measurement
    unit_of_measurement: °C
    device_class: temperature
#    attribute: current_temperature
#    on_value:
#      then:
#        - lambda: |-
#            if (!isnan(x)) {
#              id(samsung_ac).current_temperature = x;
#              id(samsung_ac).publish_state();
#            }

climate:
  - platform: samsung_ac_climate
    name: "Ar Condicionado Quarto Wagner"
    transmitter_id: ir_tx
    transmitter_pin: 14
    turbo_support: true
    id: samsung_ac
    sensor: ar_temp
    visual:
      temperature_step:
        target_temperature: 1
        current_temperature: 0.1

remote_transmitter:
  id: ir_tx
  pin: 14
  carrier_duty_percent: 50%

remote_receiver:
  id: rcvr
  pin:
    number: GPIO5
    inverted: true
    mode:
      input: true
      pullup: true
  dump: nec

binary_sensor:
  - platform: gpio
    filters:
      - delayed_on_off: 10ms
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
      inverted: true
    id: ir_button
    on_multi_click:
      - timing:
          - ON for at most 0.4s
          - OFF for at most 0.4s
          - ON for at most 0.4s
          - OFF for at least 0.2s
        then:
          - logger.log:
              format: "Duplo clique (Fan Toggle)"
              level: INFO
          - homeassistant.service:
              service: homeassistant.toggle
              data: { "entity_id": "fan.ventilador_quarto_wagner" }
      - timing:
          - ON for at least 0.8s
        then:
          - logger.log:
              format: "Clique Longo (Light Toggle)"
              level: INFO
          - homeassistant.service:
              service: homeassistant.toggle
              data: { "entity_id": "light.luz_quarto_wagner" }
      - timing:
          - ON for at most 0.4s
          - OFF for at least 0.45s
        then:
          - if:
              condition:
                lambda: "return (id(samsung_ac).mode == CLIMATE_MODE_OFF);"
              then:
                - climate.control:
                    id: samsung_ac
                    mode: COOL
              else:
                - climate.control:
                    id: samsung_ac
                    mode: "OFF"
