esphome:
  name: luz-aquario

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 0s

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret api_password

time:
  - platform: homeassistant
    on_time:
      - at: "08:00"
        then:
          - light.turn_on: luz
      - at: "22:00"
        then:
          - light.turn_off: luz

binary_sensor:
  - platform: gpio
    id: btn
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - light.toggle: luz

output:
  - platform: gpio
    id: relay
    pin: GPIO12

light:
  - platform: binary
    id: luz
    name: Luz do Aquario
    output: relay

status_led:
  pin:
    number: GPIO13
    inverted: true