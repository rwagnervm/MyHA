esphome:
  name: sanduicheira

esp8266:
  board: esp8285


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome  
    password: !secret api_password

switch:
  - platform: gpio
    restore_mode: ALWAYS_OFF
    pin: GPIO12
    id: relay
  - platform: gpio
    id: led
    pin:
      number: GPIO13
      inverted: True
  - platform: template
    id: sanduicheira
    name: Sanduicheira
    turn_on_action:
      - script.stop: timer
      - script.execute: timer
    turn_off_action:
      - switch.turn_off: relay
      - switch.turn_off: led
      - script.stop: timer

script:
  - id: timer
    then:
      - switch.turn_on: led
      - switch.turn_on: relay
      - delay: 60s
      - switch.turn_off: led
      - switch.turn_off: relay

binary_sensor:
  - platform: gpio
    id: btn
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - switch.turn_on: sanduicheira
    on_multi_click:
    - timing:
        - ON for at least 1s
      then:
        - switch.turn_off: sanduicheira