esphome:
  name: luz-quarto-pedro

esp8266:
  board: esp8285

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret api_password

binary_sensor:
  - platform: gpio
    id: btn
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - light.toggle: luz
  - platform: gpio
    id: swt
    pin:
      number: RX
      mode: INPUT_PULLUP
    on_state:
      - light.toggle: luz

output:
  - platform: gpio
    id: relay
    pin: GPIO12

light:
  - platform: binary
    id: luz
    name: Luz do Quarto do Pedro
    output: relay

status_led:
  pin:
    number: GPIO13
    inverted: true
