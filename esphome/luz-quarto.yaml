esphome:
  name: luz-quarto

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret api_password

binary_sensor:
  - platform: gpio
    id: swt1
    pin:
      number: D5
      mode: INPUT_PULLUP
    on_state:
      - light.toggle: light1

output:
  - platform: gpio
    id: relay1
    pin: 12

light:
  - platform: binary
    id: light1
    name: Luz do Quarto do Wagner
    output: relay1

remote_receiver:
  pin:
    number: D1
    mode: INPUT_PULLUP
    inverted: true
  dump: nec

sensor:
  - platform: dht
    pin: D2
    temperature:
      name: Temperatura do Quarto
    humidity:
      name: Umidade do Quarto
    model: DHT22
    update_interval: 2s

status_led:
  pin:
    number: 2
    inverted: true
