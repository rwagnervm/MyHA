binary_sensor:
  - platform: gpio
    id: swt
    pin:
      number: RX
      mode: INPUT_PULLUP
    on_state:
      - light.toggle: luz

output:
  - platform: gpio
    id: relay
    pin: GPIO12

light:
  - platform: binary
    id: luz
    name: Luz da Varanda de Tras
    output: relay
