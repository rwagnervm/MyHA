esphome:
  name: luz-quarto-paula

esp8266:
  board: esp8285

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret api_password

binary_sensor:
  - platform: gpio
    id: swt1
    pin:
      number: RX
      mode: INPUT_PULLUP
    on_state:
      - light.toggle: light1

output:
  - platform: gpio
    id: relay1
    pin: 12

light:
  - platform: binary
    id: light1
    name: Luz do Quarto da Paula
    output: relay1

sensor:
  - platform: dht
    pin: 0
    temperature:
      name: Temperatura do Quarto da Paula
    humidity:
      name: Umidade do Quarto da Paula
    model: DHT22
    update_interval: 2s

status_led:
  pin:
    number: 13
    inverted: true
