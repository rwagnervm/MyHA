esphome:
  name: ventilador-quarto-wagner

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  power_save_mode: none
  reboot_timeout: 0s

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret api_password

fan:
  - platform: speed
    name: "Ventilador do Quarto do Wagner"
    id: threespeedfan
    output: threespeedfanOutput
    speed_count: 3

binary_sensor:
  - platform: gpio
    id: ventilador_quarto_1
    pin:
      number: D1
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - fan.turn_on:
          id: threespeedfan
          speed: 1
    on_release:
      - fan.turn_off: threespeedfan
  - platform: gpio
    id: ventilador_quarto_2
    pin:
      number: D5
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - fan.turn_on:
          id: threespeedfan
          speed: 2
    on_release:
      - fan.turn_off: threespeedfan
  - platform: gpio
    id: ventilador_quarto_3
    pin:
      number: D7
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - fan.turn_on:
          id: threespeedfan
          speed: 3
    on_release:
      - fan.turn_off: threespeedfan

switch:
  - platform: gpio
    internal: true
    name: "Ventilador 3"
    pin: D6
    inverted: false
    icon: mdi:fan-speed-3
    id: relay3
    interlock: &interlock_group [relay1, relay2, relay3]
    interlock_wait_time: 100ms
            
  - platform: gpio
    name: "Ventilador 2"
    internal: true
    pin: D8
    inverted: false
    icon: mdi:fan-speed-2
    id: relay2
    interlock: *interlock_group
    interlock_wait_time: 100ms
            
  - platform: gpio
    name: "Ventilador 1"
    internal: true
    pin: D2
    inverted: false
    icon: mdi:fan-speed-1
    id: relay1 
    interlock: *interlock_group
    interlock_wait_time: 100ms

output:
  - platform: template
    id: threespeedfanOutput
    type: float 
    write_action:
      - if:
          condition:
            lambda: return ((state == 0));
          then:
            # action for off
            - switch.turn_off: relay1
            - switch.turn_off: relay2
            - switch.turn_off: relay3
      - if:
          condition:
            lambda: return ((state > 0) && (state < 0.4));
          then:
            # action for speed 1
            - switch.turn_off: relay2
            - switch.turn_off: relay3
            - switch.turn_on: relay1
            
      - if:
          condition:
            lambda: return ((state > 0.4) && (state < 0.7));
          then:
            # action for speed 2
            - switch.turn_off: relay1
            - switch.turn_off: relay3
            - switch.turn_on: relay2
            
      - if:
          condition:
            lambda: return ((state > 0.7));
          then:
            # action for speed 3
            - switch.turn_off: relay1
            - switch.turn_off: relay2
            - switch.turn_on: relay3
