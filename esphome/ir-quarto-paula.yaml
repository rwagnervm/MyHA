esphome:
  name: ir-quarto-paula

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret ota_password

sensor:
  - platform: homeassistant
    id: ar_temp
    accuracy_decimals: 1
    entity_id: sensor.temperatura_do_quarto_da_paula

climate:
  - platform: coolix
    id: ar_condicionado
    sensor: ar_temp
    receiver_id: ir_rcv
    transmitter_id: ir_tra
    name: "Ar Condicionado Paula"
    supports_heat: false
    visual:
      temperature_step:
        target_temperature: 1
        current_temperature: 0.1
      min_temperature: 22
      max_temperature: 28

remote_transmitter:
  id: ir_tra
  pin: GPIO14
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_rcv
  pin:
    number: GPIO5
    inverted: true
    mode:
      input: true
      pullup: true

binary_sensor:
  - platform: gpio
    filters:
      - delayed_on_off: 10ms
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
      inverted: true
    id: ir_button
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at most 1s
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          - homeassistant.service:
              service: homeassistant.toggle
              data: { "entity_id": "light.luz_quarto_paula" }
      - timing:
          - ON for 1.2s to 3s
          - OFF for at least 0.5s
        then:
          - homeassistant.service:
              service: homeassistant.toggle
              data: { "entity_id": "fan.ventilador_da_paula" }
      - timing:
          - ON for at most 1s
          - OFF for at least 0.5s
        then:
          - if:
              condition:
                lambda: "return (id(ar_condicionado).mode==CLIMATE_MODE_OFF);"
              then:
                - climate.control:
                    id: ar_condicionado
                    mode: COOL
              else:
                - climate.control:
                    id: ar_condicionado
                    mode: "OFF"
