esphome:
  name: portao-garagem

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret api_password

external_components:
  - source: "./custom_components"
    components: [rf433]

rf433:
  pin: D2
  readed_value:
    id: rf_code_sensor
    on_value:
      then:
        - if:
            condition:
              or:
                - text_sensor.state:
                    id: rf_code_sensor
                    state: !secret rf_portao_garagem_1
                - text_sensor.state:
                    id: rf_code_sensor
                    state: !secret rf_portao_garagem_2
                - text_sensor.state:
                    id: rf_code_sensor
                    state: !secret rf_portao_garagem_3
            then:
              - script.execute: toggle_garage_door

script:
  - id: toggle_garage_door
    then:
      - lambda: !lambda |-
          auto call = id(garagem).make_call();
          if (id(garagem).current_operation == CoverOperation::COVER_OPERATION_IDLE) {
            if (id(garagem).position == COVER_CLOSED) {
              call.set_command_open();
            } else {
              call.set_command_close();
            }
          } else if (id(garagem).current_operation == CoverOperation::COVER_OPERATION_OPENING) {
            call.set_command_stop();
          } else if (id(garagem).current_operation == CoverOperation::COVER_OPERATION_CLOSING) {
            call.set_command_stop();
          }
          call.perform();

switch:
  - platform: gpio
    pin: D5
    id: open_cover_switch
    restore_mode: ALWAYS_OFF
    interlock: [open_cover_switch, close_cover_switch]
    interlock_wait_time: 0.5s
  - platform: gpio
    pin: D6
    id: close_cover_switch
    restore_mode: ALWAYS_OFF
    interlock: [open_cover_switch, close_cover_switch]
    interlock_wait_time: 0.5s

binary_sensor:
  - platform: template
    name: "Portao da Garagem"
    id: portao
    lambda: "return !id(closed_endstop).state;"
    device_class: garage_door

  - platform: gpio
    pin:
      number: D3
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on_off: 50ms
    id: opened_endstop
    name: Portao Aberto
  - platform: gpio
    pin:
      number: D1
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on_off: 50ms
    id: closed_endstop
    name: Portao Fechado

cover:
  - platform: endstop
    device_class: garage
    id: garagem
    name: "Garagem"

    open_action:
      - switch.turn_on: open_cover_switch
      - logger.log: Abrindo portao
    open_duration: 8.5s
    open_endstop: opened_endstop

    close_action:
      - switch.turn_on: close_cover_switch
      - logger.log: Fechando portao

    close_duration: 8.5s
    close_endstop: closed_endstop

    stop_action:
      - switch.turn_off: open_cover_switch
      - switch.turn_off: close_cover_switch

    max_duration: 10s
