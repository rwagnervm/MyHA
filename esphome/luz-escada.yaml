esphome:
  name: luz-escada

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

logger:

ota:
  - platform: esphome
    password: !secret api_password

binary_sensor:
  - platform: gpio
    id: swt1
    pin:
      number: D1
      mode: INPUT_PULLUP
    on_state:
      - light.toggle: light1
  - platform: gpio
    id: swt2
    pin:
      number: D2
      mode: INPUT_PULLUP
    on_state:
      - light.toggle: light2
  - platform: gpio
    id: swt3
    pin:
      number: RX
      mode: INPUT_PULLUP
    on_state:
      - light.toggle: light2

output:
  - platform: gpio
    id: relay1
    pin: D3
  - platform: gpio
    id: relay2
    pin: D8

light:
  - platform: binary
    id: light1
    name: Luz da Escada Teto
    output: relay1
  - platform: binary
    id: light2
    name: Luz da Escada 1
    output: relay2
