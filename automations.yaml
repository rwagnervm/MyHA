- id: Apagar_Luzes_Ao_Sair
  alias: Apagar as luzes ao sair
  mode: single
  trigger:
    - platform: state
      entity_id: person.roberto_wagner
      to: not_home
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: group.todos_dispositivos
      state: "on"
  action:
    - service: alarm_control_panel.alarm_arm_away
      entity_id: alarm_control_panel.alarme
      data:
        code: !secret alarm_code
    - service: notify.mobile_app_s23
      data:
        data:
          ttl: 0
          priority: high
          notification_icon: mdi:home-lightbulb
          tag: luzes-ligadas
          actions:
            - action: desligar_luzes_notification
              title: Desligar luzes
          title: Existem luzes ligadas em casa. Deseja desligá-las?
        message:
          "{{ expand('group.todos_dispositivos') | selectattr('state', 'equalto',
          'on') | map(attribute='name') | list | join(', ') }}"

