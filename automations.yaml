### Garagem ###
- id: LigarLuzGaragemAoDetectarMovimento
  alias: Ligar a luz da garagem ao detectar movimento
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.portao_garagem
        - binary_sensor.movimento_garagem
      to: "on"
  condition:
    - condition: state
      entity_id: light.luz_garagem
      state: "off"
    - condition: or
      conditions:
        - condition: sun
          after: sunset
        - condition: sun
          before: sunrise
  action:
    - service: homeassistant.turn_on
      entity_id: light.luz_garagem

- id: DesligarLuzGaragemAposAtraso
  alias: Desligar a luz da garagem após ausência de movimento
  trigger:
    - platform: state
      entity_id: binary_sensor.movimento_garagem
      to: "off"
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: binary_sensor.portao_garagem
      state: "off"
    - condition: state
      entity_id: light.luz_garagem
      state: "on"
  action:
    - service: homeassistant.turn_off
      entity_id: light.luz_garagem

- id: NotificarCampainha
  alias: Notificar Campainha
  trigger:
    - platform: state
      entity_id: binary_sensor.campainha
      from: "off"
      to: "on"
  variables:
    time_str: "{{ now().strftime('%Y%m%d_%H%M%S') }}"
    arquivo_salvar: "/config/www/snapshots/campainha_rua1_{{ time_str }}.jpg"
    arquivo_ler: "/local/snapshots/campainha_rua1_{{ time_str }}.jpg"
  action:
    - service: shell_command.snapshot_rua1
      data:
        file: "{{ arquivo_salvar }}"
    - service: notify.mobile_app_s23
      data:
        message: Alguem tocou a campainha
        data:
          ttl: 0
          priority: high
          notification_icon: mdi:bell-ring
          image: "{{ arquivo_ler }}"
          clickAction: /dashboard-camera/camera1
          tag: campainha
    - service: media_player.play_media
      target:
        entity_id: media_player.echo_da_sala
      data:
        media_content_type: sound
        media_content_id: amzn_sfx_doorbell_chime_01
    - service: media_player.play_media
      target:
        entity_id: media_player.echo_da_sala
      data:
        media_content_type: custom
        media_content_id: "mostre a câmera rua 1"
