### Paralalos ###
#################

### Paralalo Banheiro ###
- alias: "Sincronizar Luzes do Banheiro"
  id: sincronizar_luzes_banheiro
  trigger:
    - platform: state
      entity_id:
        - light.luz_banheiro_teto
        - light.luz_banheiro_espelho
  condition:
    # Esta condição previne loops infinitos. A automação só executa se a mudança de estado
    # foi iniciada por um usuário (na interface ou fisicamente) e não por outra automação.
    - condition: template
      value_template: "{{ trigger.to_state.context.parent_id is none or trigger.to_state.context.user_id is not none }}"
    - condition: template
      value_template: "{{ trigger.to_state.state in ['on', 'off'] }}"
  action:
    # Define a luz alvo como sendo a outra luz do par.
    - variables:
        target_light: >
          {{ iif(trigger.entity_id == 'light.luz_banheiro_teto', 'light.luz_banheiro_espelho', 'light.luz_banheiro_teto') }}
    # Só executa a ação se os estados já não forem iguais.
    - condition: template
      value_template: "{{ trigger.to_state.state != states(target_light) }}"
    - service: "homeassistant.turn_{{ trigger.to_state.state }}"
      target:
        entity_id: "{{ target_light }}"
  mode: single

