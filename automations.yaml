- alias: notificar_portao_aberto
  description: "Notificar quando abrir o portão da garagem"
  trigger:
    - platform: state
      entity_id: binary_sensor.portao_garagem
      from: "off"
      to: "on"
  variables:
    time_str: "{{ now().strftime('%Y%m%d_%H%M%S') }}"
    file_garagem_save: "/config/www/snapshots/portao_aberto_{{ time_str }}.jpg"
    file_garagem_read: "/local/snapshots/portao_aberto_{{ time_str }}.jpg"
    file_rua_save: "/config/www/snapshots/portao_aberto_rua1_{{ time_str }}.jpg"
  action:
    - service: shell_command.snapshot_garagem
      data:
        file: "{{ file_garagem_save }}"
    - service: notify.mobile_app_s23
      data:
        message: "Portão Aberto"
        data:
          ttl: 0
          priority: high
          notification_icon: mdi:garage-open-variant
          image: "{{ file_garagem_read }}"
          clickAction: /lovelace-camera/camera1
          tag: portao-garagem
          actions:
            - action: fechar_portao_notification
              title: Fechar Portão
    - service: shell_command.snapshot_rua1
      data:
        file: "{{ file_rua_save }}"

- alias: notificar_portao_fechado
  description: "Notificar quando fechar o portão da garagem"
  trigger:
    - platform: state
      entity_id: binary_sensor.portao_garagem
      from: "on"
      to: "off"
  variables:
    time_str: "{{ now().strftime('%Y%m%d_%H%M%S') }}"
    file_garagem_save: "/config/www/snapshots/portao_fechado_garagem_{{ time_str }}.jpg"
    file_garagem_read: "/local/snapshots/portao_fechado_garagem_{{ time_str }}.jpg"
    file_rua_save: "/config/www/snapshots/portao_fechado_rua1_{{ time_str }}.jpg"
  action:
    - service: shell_command.snapshot_garagem
      data:
        file: "{{ file_garagem_save }}"
    - service: notify.mobile_app_s23
      data:
        message: "Portão Fechado"
        data:
          ttl: 0
          priority: high
          notification_icon: mdi:garage-variant
          image: "{{ file_garagem_read }}"
          clickAction: /lovelace-camera/camera1
          tag: portao-garagem
    - service: shell_command.snapshot_rua1
      data:
        file: "{{ file_rua_save }}"

- id: NotificationAction_FecharPortao
  alias: NotificationAction_FecharPortao
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: fechar_portao_notification
  action:
    service: cover.close_cover
    entity_id: cover.portao_garagem

- id: Estacionando
  alias: Estacionando
  trigger:
    platform: state
    entity_id: binary_sensor.dirigindo
    to: "off"
  action:
    - service: notify.mobile_app_s23
      data:
        message: request_location_update
        data:
          ttl: 0
          priority: high
    - wait_template: "{{ states.device_tracker.s23_rwvm.last_updated > states.automation.estacionando.attributes.last_triggered}}"
      timeout: 10
    - service: device_tracker.see
      data:
        dev_id: "wrv"
        location_name: Estacionado
        host_name: WRV
        gps:
          - "{{ state_attr('device_tracker.s23_rwvm', 'latitude') }}"
          - "{{ state_attr('device_tracker.s23_rwvm', 'longitude') }}"
        gps_accuracy: "{{ state_attr('device_tracker.s23_rwvm', 'gps_accuracy') }}"
    - service: notify.mobile_app_s23
      data:
        message: Carro estacionado
        data:
          notification_icon: mdi:car-search
          ttl: 0
          priority: high
          clickAction: /map
          tag: wrv-estacionando
          action_data:
            latitude: "{{ state_attr('device_tracker.wrv', 'latitude') }}"
            longitude: "{{ state_attr('device_tracker.wrv', 'longitude') }}"
