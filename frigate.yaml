mqtt:
  host: 192.168.68.57
  user: ha
  password: rw@gnervm81

cameras:
  rua1:
    ffmpeg:
      inputs:
        - path: rtsp://admin:rw@gnervm81@192.168.68.90:554/cam/realmonitor?channel=1&subtype=1&unicast=true&proto=Onvif
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/rua1
          roles:
            - record

    detect:
      enabled: true
      fps: 2

    snapshots:
      required_zones:
        - calcada

    record:
      enabled: true
      motion:
        days: 1

    zones:
      calcada:
        coordinates: 0.098,0.134,0.151,0.993,0.736,1,0.18,0.127
        loitering_time: 0

    objects:
      track:
        - person
#        - face
        - cat
        - dog
        - car
      mask: 0.742,1,0.152,0.074,0.122,0.074,0.087,0.229,0.13,1,0,1,0,0,1,0,1,1

    review:
      alerts:
        required_zones:
          - calcada
      detections:
        required_zones:
          - calcada

  garagem:
    ffmpeg:
      inputs:
        - path: rtsp://admin:rw@gnervm81@192.168.68.72:554/h264Preview_01_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/garagem
          roles:
            - record

    detect:
      enabled: true
      fps: 2

    objects:
      track:
        - person
#        - face
        - cat
        - dog

    record:
      enabled: true
      motion:
        days: 1

go2rtc:
  webrtc:
    listen: :8555
    candidates:
      - 192.168.68.57:8555
      - stun:8555
    ice_tcp: true
  rtsp:
    password: rw@gnervm81
    username: admin
  streams:
    rua1:
      - onvif://admin:rw@gnervm81@192.168.68.90
    garagem:
      - onvif://admin:rw@gnervm81@192.168.68.72:8000

ffmpeg:
  hwaccel_args: preset-vaapi

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 5

record:
  enabled: true
  continuous:
    days: 0
  alerts:
    retain:
      days: 3
      mode: active_objects
  detections:
    retain:
      days: 3
      mode: active_objects

detectors:
  ov:
    type: openvino
    device: AUTO

model:
  width: 300
  height: 300
  input_tensor: nhwc
  input_pixel_format: bgr
  path: /openvino-model/ssdlite_mobilenet_v2.xml
  labelmap_path: /openvino-model/coco_91cl_bkgr.txt

version: 0.17-0
